<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EcoleApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0E1117; --surface:#161B27; --surface2:#1E2535; --surface3:#252D40;
  --border:#2A3349; --border2:#374160;
  --accent:#4F8EF7; --accent2:#7B6CF6; --green:#22C55E; --red:#F43F5E;
  --text:#E2E8F0; --text-dim:#7D8FAF; --text-muted:#4A5568;
  --sidebar-w:240px; --radius:8px;
  --mono:'JetBrains Mono',monospace; --sans:'Sora',sans-serif;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--sans); overflow:hidden; }
.app { display:flex; height:100vh; }

/* SIDEBAR */
.sidebar {
  width:var(--sidebar-w); min-width:var(--sidebar-w);
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; z-index:100; transition:transform .25s ease;
}
.sidebar-brand {
  padding:18px 16px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px;
}
.brand-icon {
  width:30px; height:30px; background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:7px; display:flex; align-items:center; justify-content:center;
  font-size:.8rem; font-weight:700; color:#fff; font-family:var(--mono); flex-shrink:0;
}
.brand-name { font-size:.88rem; font-weight:700; }
.brand-ver { font-size:.6rem; color:var(--text-muted); font-family:var(--mono); }
.nav-wrap { padding:14px 10px; flex:1; }
.nav-label {
  font-size:.6rem; font-weight:600; text-transform:uppercase; letter-spacing:1.2px;
  color:var(--text-muted); padding:0 6px; margin-bottom:5px; display:block;
}
.nav-btn {
  display:flex; align-items:center; gap:9px; width:100%; padding:8px 10px;
  border:none; border-radius:var(--radius); background:transparent; color:var(--text-dim);
  font-family:var(--sans); font-size:.83rem; font-weight:500; cursor:pointer; transition:all .15s; text-align:left;
}
.nav-btn:hover { background:var(--surface2); color:var(--text); }
.nav-btn.active { background:rgba(79,142,247,.12); color:var(--accent); border:1px solid rgba(79,142,247,.2); }
.nav-btn:disabled { opacity:.35; cursor:default; }
.nav-tag {
  margin-left:auto; font-size:.58rem; font-weight:600; font-family:var(--mono);
  padding:2px 6px; border-radius:4px; background:var(--surface3); color:var(--text-muted); text-transform:uppercase;
}
.nav-sep { height:1px; background:var(--border); margin:10px 6px; }
.sidebar-foot { padding:10px; border-top:1px solid var(--border); }
.admin-btn {
  display:flex; align-items:center; gap:8px; width:100%; padding:8px 10px;
  border:1px solid var(--border); border-radius:var(--radius); background:transparent;
  color:var(--text-dim); font-size:.78rem; font-family:var(--sans); cursor:pointer; transition:all .15s;
}
.admin-btn:hover { border-color:var(--border2); color:var(--text); background:var(--surface2); }

/* HAMBURGER */
.hamburger {
  display:none; position:fixed; top:12px; left:12px; z-index:200;
  background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius);
  width:40px; height:40px; align-items:center; justify-content:center; font-size:1rem; cursor:pointer; color:var(--text);
}
.overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:50;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.overlay.visible { opacity:1; pointer-events:all; }

/* MAIN */
.main { flex:1; overflow-y:auto; overflow-x:hidden; }
.page { display:none; min-height:100%; animation:fadeIn .2s ease; }
.page.active { display:block; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* HOME */
.topbar {
  display:flex; align-items:center; gap:10px; padding:10px 20px;
  background:var(--surface); border-bottom:1px solid var(--border);
  font-size:.7rem; font-family:var(--mono); color:var(--text-muted);
}
.dot-green { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); }
.home-inner { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:calc(100vh - 40px); padding:40px 24px; gap:28px; }
.home-title { font-size:1.5rem; font-weight:700; text-align:center; }
.home-sub { font-size:.87rem; color:var(--text-dim); text-align:center; }
.modules-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:12px; max-width:680px; width:100%; }
.mod-card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:22px 18px; cursor:pointer; transition:all .2s; position:relative; overflow:hidden;
}
.mod-card::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); opacity:0; transition:opacity .2s; }
.mod-card:hover { border-color:var(--border2); transform:translateY(-2px); background:var(--surface2); }
.mod-card:hover::after { opacity:1; }
.mod-card.off { opacity:.4; cursor:default; pointer-events:none; }
.mod-icon { font-size:1.4rem; margin-bottom:10px; }
.mod-name { font-size:.92rem; font-weight:600; margin-bottom:3px; }
.mod-desc { font-size:.75rem; color:var(--text-dim); }
.mod-soon {
  position:absolute; top:10px; right:10px;
  font-size:.58rem; font-family:var(--mono); font-weight:600; text-transform:uppercase;
  padding:2px 7px; border-radius:4px; background:var(--surface3); color:var(--text-muted);
}

@media (max-width:640px) {
  .hamburger { display:flex; }
  .overlay { display:block; }
  .sidebar { position:fixed; top:0; left:0; bottom:0; transform:translateX(-100%); box-shadow:4px 0 24px rgba(0,0,0,.5); }
  .sidebar.open { transform:translateX(0); }
}
</style>
</head>
<body>
<button class="hamburger" id="ham">☰</button>
<div class="overlay" id="ov"></div>

<div class="app">
  <nav class="sidebar" id="sb">
    <div class="sidebar-brand">
      <div class="brand-icon">EA</div>
      <div>
        <div class="brand-name">EcoleApp</div>
        <div class="brand-ver">v2.0</div>
      </div>
    </div>
    <div class="nav-wrap">
      <span class="nav-label">Navigation</span>
      <button class="nav-btn active" data-p="home" onclick="go('home',this)">⌂ &nbsp;Accueil</button>
      <div class="nav-sep"></div>
      <span class="nav-label">Modules</span>
      <button class="nav-btn" data-p="mots" onclick="go('mots',this)">✎ &nbsp;Dictée</button>
      <button class="nav-btn" disabled>× &nbsp;Calcul <span class="nav-tag">bientôt</span></button>
      <button class="nav-btn" disabled>◎ &nbsp;Lecture <span class="nav-tag">bientôt</span></button>
    </div>
    <div class="sidebar-foot">
      <button class="admin-btn" onclick="window.open('admin.html','_blank')">⚙ &nbsp;Administration</button>
    </div>
  </nav>

  <main class="main">
    <div class="page active" id="page-home">
      <div class="topbar">
        <span class="dot-green"></span>
        <span>EcoleApp</span>
        <span style="color:var(--border2)">|</span>
        <span id="tdate"></span>
      </div>
      <div class="home-inner">
        <div>
          <div class="home-title">Tableau de bord</div>
          <div class="home-sub" style="margin-top:6px">Sélectionne un module pour commencer</div>
        </div>
        <div class="modules-grid">
          <div class="mod-card" onclick="go('mots',document.querySelector('[data-p=mots]'))">
            <div class="mod-icon">✎</div>
            <div class="mod-name">Dictée</div>
            <div class="mod-desc">Orthographe · mots de la semaine</div>
          </div>
          <div class="mod-card off">
            <div class="mod-icon">×</div>
            <div class="mod-name">Calcul</div>
            <div class="mod-desc">Tables de multiplication</div>
            <span class="mod-soon">bientôt</span>
          </div>
          <div class="mod-card off">
            <div class="mod-icon">◎</div>
            <div class="mod-name">Lecture</div>
            <div class="mod-desc">Textes &amp; compréhension</div>
            <span class="mod-soon">bientôt</span>
          </div>
        </div>
      </div>
    </div>

    <div class="page" id="page-mots" style="height:100vh;">
      <iframe id="mfr" src="" style="width:100%;height:100%;border:none;"></iframe>
    </div>
  </main>
</div>

<script>
let mLoaded=false;
function go(id,btn){
  document.querySelectorAll('.nav-btn[data-p]').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(id==='mots'&&!mLoaded){ document.getElementById('mfr').src='app-mots.html'; mLoaded=true; }
  close_sb();
}
document.getElementById('tdate').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
const sb=document.getElementById('sb'),ov=document.getElementById('ov');
document.getElementById('ham').onclick=()=>{sb.classList.toggle('open');ov.classList.toggle('visible');};
ov.onclick=close_sb;
function close_sb(){sb.classList.remove('open');ov.classList.remove('visible');}
</script>
</body>
</html>
